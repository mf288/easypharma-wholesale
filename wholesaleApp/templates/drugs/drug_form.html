{% extends 'includes/base.html' %}

{% block title %}{{ page_title }}{% endblock %}
{% block page_title %}{{ page_title }}{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">{{ page_title }}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row g-4">
                        <div class="col-md-12">
                            <label class="form-label">Generic / Chemical Composition Name <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" value="{{ drug.name|default:'' }}" placeholder="e.g., Paracetamol 500mg, Amoxicillin 500mg + Clavulanic Acid 125mg" required>
                            <div class="form-text text-muted">Include strength metrics (mg, mcg, ml) for accurate substitution tracking.</div>
                        </div>
                    </div>
                    
                    <div class="mt-5">
                        <button type="submit" class="btn btn-primary btn-lg px-5">Save Generic Salt</button>
                        <a href="{% url 'drug_list' %}" class="btn btn-secondary btn-lg px-5">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
