<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Easy Pharma Wholesale</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f5f3ff 0%, #edd8fc 50%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract Floating Accents */
        .shape-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.4) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: 1;
            animation: floatShape 8s infinite alternate;
        }
        .shape-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.3) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: 1;
            animation: floatShape 12s infinite alternate-reverse;
        }

        @keyframes floatShape {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(40px) scale(1.1); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.08), 0 15px 25px -10px rgba(0, 0, 0, 0.05);
            z-index: 10;
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .login-header {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            padding: 40px 20px;
            text-align: center;
            color: #ffffff;
            position: relative;
        }
        .login-header::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            right: 0;
            height: 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 20px 20px 0 0;
        }

        .logo-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            display: inline-block;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            animation: logoPulse 3s infinite;
        }

        @keyframes logoPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            background-color: rgba(255, 255, 255, 0.7);
            transition: all 0.2s ease;
        }
        .form-control:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
            background-color: #ffffff;
        }

        .btn-login {
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        /* Toast Container Customization */
        .toast-container {
            z-index: 1060;
        }
    </style>
</head>
<body>

    <div class="shape-1"></div>
    <div class="shape-2"></div>

    <div class="login-card p-0 shadow">
        <div class="login-header">
            <span class="logo-icon">🏢</span>
            <h3 class="fw-extrabold mb-1">Easy Pharma</h3>
            <p class="text-white-50 mb-0 small">Wholesale & SaaS Management Portal</p>
        </div>

        <div class="p-4 pt-2">
            <!-- Toast notification messages -->
            {% if messages %}
                <div class="mb-3">
                    {% for msg in messages %}
                        <div class="alert alert-{% if msg.tags == 'error' %}danger{% else %}{{ msg.tags }}{% endif %} alert-dismissible fade show rounded-3 small py-2" role="alert">
                            {{ msg }}
                            <button type="button" class="btn-close py-2" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold"><i class="bi bi-person-fill"></i> Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username..." required autofocus>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold"><i class="bi bi-lock-fill"></i> Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password..." required>
                </div>

                <button type="submit" class="btn btn-primary btn-login w-100 text-white shadow-sm mb-3">
                    Sign In to Portal
                </button>

                <div class="text-center text-muted small" style="font-size: 11px;">
                    <i class="bi bi-shield-fill-check text-success"></i> Dec 2026 SaaS Production Compliant
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
